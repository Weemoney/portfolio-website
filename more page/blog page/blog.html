<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Bagus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:  #00ff64;
      --purple: #9115da;
      --orange: #ff6a00;
      --white:  #f0f0f0;
      --dark:   #0a0a0f;
      --muted:  rgba(255,255,255,0.35);
      --card-border: rgba(255,255,255,0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,255,100,0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(145,21,218,0.05) 0%, transparent 50%),
        var(--dark);
      color: var(--white);
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .back-link {
      color: var(--green);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.05em;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .page-title {
      font-size: 12px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
    }
    .page-title span { color: var(--orange); }

    .admin-link {
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      text-decoration: none;
      letter-spacing: 0.08em;
      border: 1px solid rgba(255,255,255,0.07);
      padding: 3px 9px;
      transition: all 0.2s;
    }
    .admin-link:hover { color: var(--orange); border-color: rgba(255,106,0,0.3); }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 14px 28px 10px;
      min-height: 0;
    }

    /* FEED META ROW */
    .feed-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .feed-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgb(204, 200, 200);
    }
    .feed-label::before { content: '> '; color: var(--green); }

    .feed-info {
      font-size: 10px;
      color: rgb(204, 200, 200);
      letter-spacing: 0.08em;
    }

    /* GRID */
    .post-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      min-height: 0;
    }

    /* CARD */
    .post-card {
      display: flex;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--card-border);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
      align-items: center;
    }

    .post-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.02);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .post-card:hover {
      border-color: rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.015);
    }
    .post-card:hover::before { opacity: 1; }

    /* LEFT */
    .post-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 5px;
      min-width: 0;
    }

    .post-top { display: flex; flex-direction: column; gap: 4px; }

    .post-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }
    .post-card:hover .post-title { color: var(--green); }

    .post-preview {
      font-size: 10.5px;
      line-height: 1.6;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.02em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-clamp: 2;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .post-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .post-date {
      font-size: 9px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .post-tags { display: flex; gap: 4px; flex-wrap: wrap; }

    .tag {
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 1px 5px;
      border: 1px solid;
      border-radius: 2px;
    }

    .tag-green  { color: var(--green);  border-color: rgba(0,255,100,0.2); }
    .tag-purple { color: #c96ef5;       border-color: rgba(145,21,218,0.25); }
    .tag-orange { color: var(--orange); border-color: rgba(255,106,0,0.2); }
    .tag-default{ color: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.1); }

    /* IMAGE */
    .post-image {
      width: 80px;
      height: 60px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .post-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.65;
      transition: opacity 0.2s;
    }
    .post-card:hover .post-image img { opacity: 0.85; }

    .no-img-label {
      font-size: 8px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.08);
      text-transform: uppercase;
    }

    /* EMPTY / LOADING */
    .state-msg {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: rgb(172, 162, 162);
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    .state-msg .big { font-size: 28px; opacity: 0.25; }

    /* PAGINATION */
    .pagination {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 0 4px;
    }

    .pg-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      width: 30px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 2px;
    }

    .pg-btn:hover:not(:disabled):not(.active) {
      border-color: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.04);
    }

    .pg-btn.active {
      border-color: var(--green);
      color: var(--green);
      background: rgba(0,255,100,0.06);
    }

    .pg-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .pg-btn.arrow {
      width: 36px;
      font-size: 13px;
    }

    .pg-ellipsis {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      padding: 0 4px;
      letter-spacing: 0.05em;
      line-height: 28px;
    }
  </style>
</head>
<body>

  <header>
    <a href="https://weemoney.github.io/portfolio-website/more%20page/more.html" class="back-link">← journal_blog</a>
    <div class="header-right">
      <span class="page-title">// <span>blog</span></span>
      <a href="admin.html" class="admin-link">admin</a>
    </div>
  </header>

  <main>
    <div class="feed-meta">
      <span class="feed-label">latest posts</span>
      <span class="feed-info" id="feed-info"></span>
    </div>

    <div class="post-grid" id="post-grid">
      <div class="state-msg"><span>There is no post? Then, start writing!</span></div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>

  <script>
    const GITHUB_USER = 'Weemoney';
    const GITHUB_REPO = 'portfolio-website';
    const POSTS_FILE  = 'more%20page/blog%20page/blog/posts.json';
    const PER_PAGE    = 6;

    const TAG_COLORS  = ['tag-green', 'tag-purple', 'tag-orange', 'tag-default'];

    function tagColor(tag) {
      let h = 0;
      for (let c of tag) h += c.charCodeAt(0);
      return TAG_COLORS[h % TAG_COLORS.length];
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    let allPosts  = [];
    let curPage   = 1;

    async function loadPosts() {
      try {
        const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${POSTS_FILE}?t=${Date.now()}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error();
        allPosts = await res.json();
        allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
        renderPage(1);
      } catch {
        document.getElementById('post-grid').innerHTML =
          `<div class="state-msg"><span class="big">∅</span><span>no posts yet</span></div>`;
      }
    }

    function renderPage(page) {
      curPage = page;
      const grid      = document.getElementById('post-grid');
      const total     = allPosts.length;
      const totalPages = Math.ceil(total / PER_PAGE);
      const start     = (page - 1) * PER_PAGE;
      const slice     = allPosts.slice(start, start + PER_PAGE);

      document.getElementById('feed-info').textContent =
        total ? `${start + 1}–${Math.min(start + PER_PAGE, total)} of ${total}` : '';

      if (!total) {
        grid.innerHTML = `<div class="state-msg"><span class="big">∅</span><span>no posts yet</span></div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      // pad to 6 cards so grid stays full
      const cards = slice.map(post => {
        const preview = post.preview || 'No preview available... .';
        const tags    = (post.tags || []).map(t =>
          `<span class="tag ${tagColor(t)}">${t}</span>`).join('');
        const imgHtml = post.image
          ? `<img src="${post.image}" alt="" loading="lazy">`
          : `<span class="no-img-label">no img</span>`;

        return `
          <div class="post-card" onclick="window.location='post.html?id=${post.id}'">
            <div class="post-left">
              <div class="post-top">
                <div class="post-title">${post.title}</div>
                <div class="post-preview">${preview}</div>
              </div>
              <div class="post-bottom">
                <span class="post-date">${formatDate(post.date)}</span>
                <div class="post-tags">${tags}</div>
              </div>
            </div>
            <div class="post-image ${post.image ? '' : 'no-image'}">${imgHtml}</div>
          </div>`;
      });

      // fill empty slots so grid rows stay even
      while (cards.length < PER_PAGE) {
        cards.push(`<div class="post-card" style="opacity:0;pointer-events:none;"></div>`);
      }

      grid.innerHTML = cards.join('');
      renderPagination(page, totalPages);
    }

    function renderPagination(cur, total) {
      const pg = document.getElementById('pagination');
      if (total <= 1) { pg.innerHTML = ''; return; }

      let html = '';

      // prev arrow
      html += `<button class="pg-btn arrow" onclick="renderPage(${cur - 1})" ${cur === 1 ? 'disabled' : ''}>‹</button>`;

      // page numbers with ellipsis
      const pages = getPageNumbers(cur, total);
      let prev = null;
      for (const p of pages) {
        if (prev !== null && p - prev > 1) {
          html += `<span class="pg-ellipsis">…</span>`;
        }
        html += `<button class="pg-btn ${p === cur ? 'active' : ''}" onclick="renderPage(${p})">${p}</button>`;
        prev = p;
      }

      // next arrow
      html += `<button class="pg-btn arrow" onclick="renderPage(${cur + 1})" ${cur === total ? 'disabled' : ''}>›</button>`;

      pg.innerHTML = html;
    }

    function getPageNumbers(cur, total) {
      if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
      const pages = new Set([1, total, cur]);
      if (cur > 1) pages.add(cur - 1);
      if (cur < total) pages.add(cur + 1);
      return [...pages].sort((a, b) => a - b);
    }

    async function loadPosts() {
  try {
    const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${POSTS_FILE}?t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    allPosts = await res.json();
    allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));

    // fetch preview untuk post yang belum punya
    await Promise.all(allPosts.map(async post => {
      if (!post.preview && post.file) {
        try {
          const mdUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${post.file}?t=${Date.now()}`;
          const mdRes = await fetch(mdUrl);
          if (mdRes.ok) {
            const md = await mdRes.text();
            post.preview = md.replace(/[#*`>\-]/g, '').trim().slice(0, 69) + ' ....';
          }
        } catch {}
      }
    }));

    renderPage(1);
  } catch {
    document.getElementById('post-grid').innerHTML =
      `<div class="state-msg"><span class="big">∅</span><span>no posts yet</span></div>`;
  }
}
  </script>

</body>
</html>
