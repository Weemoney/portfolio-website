<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Bagus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:  #00ff64;
      --purple: #9115da;
      --orange: #ff6a00;
      --white:  #f0f0f0;
      --dark:   #0a0a0f;
      --muted:  rgba(255,255,255,0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,255,100,0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 60%, rgba(145,21,218,0.06) 0%, transparent 50%),
        var(--dark);
      color: var(--white);
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
    }

    .back-link {
      color: var(--green);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.05em;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .page-title {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35);
    }
    .page-title span { color: var(--orange); }

    .admin-link {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      text-decoration: none;
      letter-spacing: 0.08em;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 4px 10px;
      transition: all 0.2s;
    }
    .admin-link:hover {
      color: var(--orange);
      border-color: rgba(255,106,0,0.3);
    }

    /* MAIN */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 32px 80px;
    }

    /* FEED HEADER */
    .feed-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .feed-title {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .feed-title::before { content: '> '; color: var(--green); }

    .feed-count {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }

    /* POST CARD */
    .post-card {
      display: flex;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      cursor: pointer;
      position: relative;
    }

    .post-card::before {
      content: '';
      position: absolute;
      left: -32px; right: -32px;
      top: 0; bottom: 0;
      background: rgba(255,255,255,0.02);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .post-card:hover::before { opacity: 1; }

    /* LEFT */
    .post-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .post-date {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
    }

    .post-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid;
      border-radius: 2px;
    }

    .tag-green  { color: var(--green);  border-color: rgba(0,255,100,0.25); }
    .tag-purple { color: #c96ef5;       border-color: rgba(145,21,218,0.3); }
    .tag-orange { color: var(--orange); border-color: rgba(255,106,0,0.25); }
    .tag-default{ color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.12); }

    .post-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: 0.01em;
      transition: color 0.15s;
    }
    .post-card:hover .post-title { color: var(--green); }

    .post-preview {
      font-size: 12px;
      line-height: 1.7;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.02em;
    }

    /* RIGHT — image box */
    .post-image {
      width: 130px;
      height: 90px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.03);
      align-self: center;
    }

    .post-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .post-card:hover .post-image img { opacity: 0.9; }

    .post-image.no-image {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .no-image-label {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.1);
      text-transform: uppercase;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 80px 0;
      color: rgba(255,255,255,0.2);
    }

    .empty-state .big {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 60px 0;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }

    .loading::after {
      content: '';
      animation: dots 1.2s step-end infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/more page/more.html" class="back-link">← my_journal</a>
    <div class="header-right">
      <span class="page-title">// <span>blog</span></span>
      <a href="admin.html" class="admin-link">admin</a>
    </div>
  </header>

  <main>
    <div class="feed-header">
      <span class="feed-title">latest posts</span>
      <span class="feed-count" id="feed-count"></span>
    </div>

    <div id="feed">
      <div class="loading">loading posts</div>
    </div>
  </main>

  <script>
    const GITHUB_USER = 'Weemoney';
    const GITHUB_REPO = 'portfolio-website';
    const POSTS_FILE = 'more%20page/blog%20page/blog/posts.json';

    const TAG_COLORS = ['tag-green', 'tag-purple', 'tag-orange', 'tag-default'];

    function tagColor(tag) {
      let hash = 0;
      for (let c of tag) hash += c.charCodeAt(0);
      return TAG_COLORS[hash % TAG_COLORS.length];
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    async function loadPosts() {
      const feed = document.getElementById('feed');
      try {
        const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${POSTS_FILE}?t=${Date.now()}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('not found');
        const posts = await res.json();

        if (!posts.length) {
          feed.innerHTML = `
            <div class="empty-state">
              <div class="big">∅</div>
              <p>no posts yet — go write something</p>
            </div>`;
          return;
        }

        document.getElementById('feed-count').textContent = `${posts.length} post${posts.length > 1 ? 's' : ''}`;

        // sort newest first
        posts.sort((a, b) => new Date(b.date) - new Date(a.date));

        feed.innerHTML = posts.map(post => {
          const preview = post.content
            ? post.content.replace(/[#*`>\-]/g, '').trim().slice(0, 100) + '....'
            : 'No preview available....';

          const tagsHtml = (post.tags || []).map(t =>
            `<span class="tag ${tagColor(t)}">${t}</span>`
          ).join('');

          const imageHtml = post.image
            ? `<img src="${post.image}" alt="${post.title}" loading="lazy">`
            : `<span class="no-image-label">no image</span>`;

          return `
            <div class="post-card" onclick="window.location='post.html?id=${post.id}'">
              <div class="post-left">
                <div class="post-meta">
                  <span class="post-date">${formatDate(post.date)}</span>
                  <div class="post-tags">${tagsHtml}</div>
                </div>
                <div class="post-title">${post.title}</div>
                <div class="post-preview">${preview}</div>
              </div>
              <div class="post-image ${post.image ? '' : 'no-image'}">
                ${imageHtml}
              </div>
            </div>`;
        }).join('');

      } catch (e) {
        feed.innerHTML = `
          <div class="empty-state">
            <div class="big">∅</div>
            <p>no posts yet — go write something</p>
          </div>`;
      }
    }

    loadPosts();
  </script>

</body>
</html>
