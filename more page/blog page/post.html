<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Bagus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --green:  #00ff64;
      --purple: #9115da;
      --orange: #ff6a00;
      --white:  #f0f0f0;
      --dark:   #0a0a0f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      background:
        radial-gradient(circle at 15% 30%, rgba(145,21,218,0.06) 0%, transparent 50%),
        radial-gradient(circle at 85% 70%, rgba(0,255,100,0.04) 0%, transparent 50%),
        var(--dark);
      color: var(--white);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
    }

    .back-link {
      color: var(--green);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.05em;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }

    .page-title {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35);
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 32px 100px;
    }

    /* POST HEADER */
    .post-header { margin-bottom: 48px; }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .post-date {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.1em;
    }

    .post-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .tag {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid;
      border-radius: 2px;
    }

    .tag-green  { color: var(--green);  border-color: rgba(0,255,100,0.25); }
    .tag-purple { color: #c96ef5;       border-color: rgba(145,21,218,0.3); }
    .tag-orange { color: var(--orange); border-color: rgba(255,106,0,0.25); }
    .tag-default{ color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.12); }

    .post-title {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    .post-cover {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.08);
      opacity: 0.85;
      display: block;
    }

    /* CONTENT */
    .post-content {
      font-size: 14px;
      line-height: 1.9;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.02em;
    }

    .post-content h1,
    .post-content h2,
    .post-content h3 {
      font-family: 'Playfair Display', serif;
      color: var(--white);
      margin: 36px 0 14px;
      line-height: 1.3;
    }
    .post-content h1 { font-size: 28px; }
    .post-content h2 { font-size: 22px; }
    .post-content h3 { font-size: 18px; color: rgba(255,255,255,0.8); }

    .post-content p { margin-bottom: 20px; }

    .post-content strong { color: var(--white); font-weight: 700; }
    .post-content em { color: rgba(255,255,255,0.6); font-style: italic; }

    .post-content a {
      color: var(--green);
      text-decoration: none;
      border-bottom: 1px solid rgba(0,255,100,0.3);
      transition: border-color 0.2s;
    }
    .post-content a:hover { border-color: var(--green); }

    .post-content code {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 2px 6px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--orange);
    }

    .post-content pre {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-left: 3px solid var(--green);
      padding: 20px;
      overflow-x: auto;
      margin: 24px 0;
    }
    .post-content pre code {
      background: none;
      border: none;
      padding: 0;
      color: rgba(255,255,255,0.7);
    }

    .post-content blockquote {
      border-left: 3px solid var(--purple);
      padding: 4px 20px;
      margin: 24px 0;
      color: rgba(255,255,255,0.5);
      font-style: italic;
    }

    .post-content ul,
    .post-content ol {
      padding-left: 24px;
      margin-bottom: 20px;
    }
    .post-content li { margin-bottom: 6px; }

    .post-content hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 36px 0;
    }

    .post-content img {
      max-width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      opacity: 0.85;
    }

    /* STATES */
    .state-msg {
      text-align: center;
      padding: 80px 0;
      color: rgba(255,255,255,0.2);
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    /* FADE IN */
    .post-header {
      opacity: 0;
      animation: fadeUp 0.5s ease 0.1s forwards;
    }
    .post-content {
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <a href="blog.html" class="back-link">← blog</a>
    <span class="page-title" id="header-title">// post</span>
  </header>

  <main id="main">
    <div class="state-msg">loading...</div>
  </main>

  <script>
    const GITHUB_USER = 'Weemoney';
    const GITHUB_REPO = 'portfolio-website';
    const POSTS_FILE  = 'more%20page/blog%20page/blog/posts.json';

    const TAG_COLORS = ['tag-green', 'tag-purple', 'tag-orange', 'tag-default'];

    function tagColor(tag) {
      let h = 0;
      for (let c of tag) h += c.charCodeAt(0);
      return TAG_COLORS[h % TAG_COLORS.length];
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function encodePath(p) {
      return p.split('/').map(s => encodeURIComponent(s)).join('/');
    }

    async function loadPost() {
      const main = document.getElementById('main');
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        main.innerHTML = `<div class="state-msg">no post id provided</div>`;
        return;
      }

      try {
        // 1. fetch index
        const indexUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${POSTS_FILE}?t=${Date.now()}`;
        const indexRes = await fetch(indexUrl);
        if (!indexRes.ok) throw new Error('index not found');
        const posts = await indexRes.json();

        const post = posts.find(p => p.id === id);
        if (!post) throw new Error('post not found');

        // 2. fetch markdown content
        const fileUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${encodePath(post.file)}?t=${Date.now()}`;
        const fileRes = await fetch(fileUrl);
        if (!fileRes.ok) throw new Error('content not found');
        const markdown = await fileRes.text();

        // 3. render
        document.title = `${post.title} — Bagus`;
        document.getElementById('header-title').textContent =
          `// ${post.title.length > 40 ? post.title.slice(0, 40) + '...' : post.title}`;

        const tagsHtml = (post.tags || []).map(t =>
          `<span class="tag ${tagColor(t)}">${t}</span>`).join('');

        const coverHtml = post.image
          ? `<img class="post-cover" src="${post.image}" alt="${post.title}" />`
          : '';

        main.innerHTML = `
          <div class="post-header">
            <div class="post-meta">
              <span class="post-date">${formatDate(post.date)}</span>
              <div class="post-tags">${tagsHtml}</div>
            </div>
            <h1 class="post-title">${post.title}</h1>
            ${coverHtml}
          </div>
          <div class="post-content" id="post-content"></div>
        `;

        document.getElementById('post-content').innerHTML = marked.parse(markdown);

      } catch (e) {
        main.innerHTML = `<div class="state-msg">post not found</div>`;
      }
    }

    loadPost();
  </script>

</body>
</html>
