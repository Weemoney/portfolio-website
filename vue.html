<!DOCTYPE html>
<html lang="en">

    <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
</head>
<body>
    <div class="container">

            <img src="https://tse2.mm.bing.net/th/id/OIP.Vn3TzTmAICHapgcH1AKcAgHaEo?rs=1&pid=ImgDetMain&o=7&rm=3" alt="About">

        </a>

        <a href="skills page\skills.html" class="collage-item small-1">
            <img src="https://wallpaperaccess.com/full/1657886.jpg" alt="Skills">
            <span>Skills</span>
        </a>

        <a href="contact page\contact.html" class="collage-item small-2">
            <img src="https://media.istockphoto.com/id/1284777157/photo/telephone.jpg?s=612x612&w=0&k=20&c=iDSX28rxRUwlUDShoG0STLmpkCxfu4DPb6C3MGrPBew=" alt="Contact">
            <span>Contact</span>

    </div>


    <!-- RIGHT SIDE – WELCOME MESSAGE -->
    <div class="right-welcome">
        <img src="https://siakad.ub.ac.id/dirfoto/foto/foto_2025/255091200111008.jpg" class="profile" alt="Profile">

        <h1>Hello! I'm Bagus 👋</h1>

        <p>
                I’m a Bioinformatics student passionate about coding, writing,
                multimedia, and creative technology.  
                Welcome to my personal space!
        </p>

        <div class="btn-group">
            <a href="more page\more.html" class="btn">Learn More →</a>
        </div>
    </div>

    <div id="music-player">
        <audio id="audio" src="assets\I Really Want To Stay At Your House (80s Synthwave Remix) ♪.mp3"></audio>
        <div class="playbar"></div>
        <button id="play-btn">▶️</button>
        <div id="progress-container">
        <div id="progress"></div>
        </div>
        <span id="current-time">0:00</span> / <span id="duration">0:00</span>
    </div>
</div>

<script>
        Vue.createApp({
            data() {
                return {
                    pageTitle: 'Hello, Vue!',
                    content: 'This is a simple Vue.js application demonstrating data binding.'
                };
            }
        }).mount('#content');

        const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const progress = document.getElementById('progress');
const progressContainer = document.getElementById('progress-container');
const currentTimeEl = document.getElementById('current-time');
const durationEl = document.getElementById('duration');

playBtn.addEventListener('click', () => {
  if(audio.paused) {
    audio.play();
    playBtn.textContent = '⏸️';
  } else {
    audio.pause();
    playBtn.textContent = '▶️';
  }
});

// Update progress bar
audio.addEventListener('timeupdate', () => {
  const percent = (audio.currentTime / audio.duration) * 100;
  progress.style.width = percent + '%';
  currentTimeEl.textContent = formatTime(audio.currentTime);
  durationEl.textContent = formatTime(audio.duration);
});

// Klik progress bar untuk seek
progressContainer.addEventListener('click', e => {
  const width = progressContainer.clientWidth;
  const clickX = e.offsetX;
  audio.currentTime = (clickX / width) * audio.duration;
});

// Helper function
function formatTime(time) {
  const minutes = Math.floor(time / 60) || 0;
  const seconds = Math.floor(time % 60) || 0;
  return `${minutes}:${seconds < 10 ? '0'+seconds : seconds}`;
}
</script>
</body>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    color: #ffffff;
    background: #0c0c0f;
    height: 100vh;
    overflow-x: hidden;   /* aktifkan horizontal scroll */
    overflow-y: hidden; /* biar tetap full screen */
    position: relative;
}

/* === OUTER FLEXBOX === */
.layout {
    display: flex;
    gap: 40px;
    padding: 40px;
    height: 100vh;
}

/* === LEFT SIDE (KOLASE) === */
.mosaic {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 200px;
    gap: 15px;
}

.tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
}
.tile:hover {
    transform: scale(1.05);
    transition: transform 0.3s ease;
    cursor: pointer;
}

#music-player {
  width: 265px;
  background: #222;
  padding: 1rem;
  border-radius: 100px;
  color: white;
  display: flex;
  align-items: center;
  gap: 10px;
  position: absolute;
  bottom: 60px;
}

#progress-container {
  flex: 1;
  background: #444;
  height: 5px;
  cursor: pointer;
  position: relative;
}

#progress {
  background: #0f0; /* bisa diganti neon/cyber */
  width: 0%;
  height: 100%;
}

/* === RIGHT SIDE === */
.right-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 40px;
}

/* Glow Effect */
.projects, .about {
    background: rgba(255,255,255,0.05);
    padding: 24px;
    border-radius: 18px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(255,255,255,0.08);
}

/* Cards */
.project-list {
    display: flex;
    gap: 16px;
}

.project-card {
    background: rgba(255,255,255,0.1);
    padding: 12px;
    border-radius: 12px;
    flex: 1;
}

.project-card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 8px;
}


/* ----------------------------------------------------------
   BACKGROUND GLOW
---------------------------------------------------------- */
body::before {
    content: "";
    position: absolute;
    width: 480px;
    height: 480px;
    background: #00aaff;
    filter: blur(220px);
    top: -120px;
    left: -140px;
    opacity: 0.45;
    z-index: -1;
}

body::after {
    content: "";
    position: absolute;
    width: 520px;
    height: 520px;
    background: #ff00c8;
    filter: blur(260px);
    bottom: -160px;
    right: -120px;
    opacity: 0.4;
    z-index: -1;
}


/* ----------------------------------------------------------
   MAIN LAYOUT
---------------------------------------------------------- */
.container {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 40px;
    padding: 60px;
    min-height: 100vh;
}


/* ----------------------------------------------------------
   LEFT SIDE – COLLAGE
---------------------------------------------------------- */
.left-collage {
    display: grid;
    gap: 20px;

    /* Grid area mapping */
    grid-template-areas:
        "vertical horizontal"
        "vertical small1"
        "vertical small2";
}

.collage-item {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    color: white;
    transition: transform .25s ease, filter .25s ease;
}

/* Change the Skills label color & position — pick your color/spacing */
.collage-item.small-1 span {
    color: #000000;
    right: 14px;   /* place at right-bottom */
    left: auto;    /* override the default left positioning */
    text-align: right;
}
.collage-item.small-1:hover span {
    color: #ffffff;
}

.collage-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}


/* Hover effect */
.collage-item:hover {
    transform: scale(1.03);
    filter: brightness(0.8);
}

.collage-item span {
    position: absolute;
    bottom: 12px;
    left: 14px;
    font-weight: 600;
    font-size: 1.1rem;
    text-shadow: 24px rgba(0, 0, 0, 0.5);
}


/* Specific collage sizes */
.tall-vertical { 
    grid-area: vertical; 
    height: 460px; 
}

.horizontal { 
    grid-area: horizontal; 
    height: 200px; 
}

.small-1 { 
    grid-area: small1; 
    height: 140px; 
}

.small-2 { 
    grid-area: small2; 
    height: 140px; 
}


/* ----------------------------------------------------------
   RIGHT SIDE – WELCOME SECTION
---------------------------------------------------------- */
.right-welcome {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-right: 40px;
}

.profile {
    width: 135px;
    height: 135px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 20px;
    border: 3px solid rgba(255,255,255,0.2);
}

.right-welcome h1 {
    font-size: 2.6rem;
    margin-bottom: 12px;
    font-weight: 700;
}

.right-welcome p {
    font-size: 1.1rem;
    line-height: 1.7;
    max-width: 480px;
    opacity: 0.9;
    margin-bottom: 30px;
}


/* Button */
.btn-group .btn {
    display: inline-block;
    padding: 12px 22px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    backdrop-filter: blur(6px);
    transition: background .25s ease;
}

.btn-group .btn:hover {
    background: rgba(255, 255, 255, 0.28);
}


/* ----------------------------------------------------------
   RESPONSIVE – TABLET & MOBILE
---------------------------------------------------------- */
@media (max-width: 980px) {
    .container {
        grid-template-columns: 1fr;
    }

    .right-welcome {
        padding-right: 0;
        margin-top: 40px;
        text-align: center;
        align-items: center;
    }
}

@media (max-width: 600px) {
    .container {
        padding: 30px;
    }

    .left-collage {
        grid-template-areas:
            "vertical"
            "horizontal"
            "small1"
            "small2";
    }

    .tall-vertical { height: 350px; }
    .horizontal { height: 180px; }
    .small-1, .small-2 { height: 140px; }
}
</style>
</html>
